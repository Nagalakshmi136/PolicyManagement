name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test — Domain
        run: |
          dotnet test tests/PolicyManagement.Domain.Tests \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=domain-results.trx" \
            --results-directory TestResults

      - name: Test — Application
        run: |
          dotnet test tests/PolicyManagement.Application.Tests \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=application-results.trx" \
            --results-directory TestResults

      - name: Test — Infrastructure
        run: |
          dotnet test tests/PolicyManagement.Infrastructure.Tests \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=infrastructure-results.trx" \
            --results-directory TestResults

      - name: Test — API (Integration)
        run: |
          dotnet test tests/PolicyManagement.Api.Tests \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=api-results.trx" \
            --results-directory TestResults

      - name: Publish test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/*.trx
          retention-days: 7
