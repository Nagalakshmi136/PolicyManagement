services:

  # ── SQL Server 2022 ──────────────────────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        - CMD-SHELL
        - >
          /opt/mssql-tools18/bin/sqlcmd
          -S localhost,1433
          -U sa
          -P "$$SA_PASSWORD"
          -Q "SELECT 1"
          -b -C
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── Keycloak 24 ──────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 45s

  # ── Policy Management API ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: >-
        Server=db,1433;Database=PolicyManagement;
        User Id=sa;Password=${SA_PASSWORD};
        TrustServerCertificate=True;
      Keycloak__Authority: http://keycloak:8080/realms/policy-mgmt
      Keycloak__Audience: policy-management-api
      Cache__SlidingExpirationSeconds: "60"
      Cache__AbsoluteExpirationSeconds: "300"
      Cache__ExpiringSoonDays: "30"
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  sqlserver_data:
